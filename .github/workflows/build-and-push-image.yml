name: Build and Push GPU Operator Image

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    name: Build and push manager image
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25.x"

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Install yq
        run: |
          sudo wget -qO /usr/local/bin/yq https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
          sudo chmod +x /usr/local/bin/yq

      - name: Login to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve image tags
        id: tags
        run: |
          IMAGE_REPO="ghcr.io/${GITHUB_REPOSITORY_OWNER,,}/amd-gpu-operator"
          SHA_TAG="sha-${GITHUB_SHA::7}"
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            PRIMARY_TAG="${GITHUB_REF_NAME}"
          elif [[ "${GITHUB_REF_NAME}" == "main" ]]; then
            PRIMARY_TAG="latest"
          else
            PRIMARY_TAG="${SHA_TAG}"
          fi
          {
            echo "image_repo=${IMAGE_REPO}"
            echo "primary_tag=${PRIMARY_TAG}"
            echo "sha_tag=${SHA_TAG}"
          } >> "${GITHUB_OUTPUT}"

      - name: Build image via Makefile
        env:
          IMG: ${{ steps.tags.outputs.image_repo }}:${{ steps.tags.outputs.primary_tag }}
        run: |
          make helm-k8s
          make docker-build

      - name: Add extra SHA tag
        if: github.event_name != 'pull_request' && steps.tags.outputs.primary_tag != steps.tags.outputs.sha_tag
        run: |
          docker tag \
            "${{ steps.tags.outputs.image_repo }}:${{ steps.tags.outputs.primary_tag }}" \
            "${{ steps.tags.outputs.image_repo }}:${{ steps.tags.outputs.sha_tag }}"

      - name: Push image(s) via Makefile
        if: github.event_name != 'pull_request'
        env:
          IMG: ${{ steps.tags.outputs.image_repo }}:${{ steps.tags.outputs.primary_tag }}
        run: |
          make docker-push
          if [[ "${{ steps.tags.outputs.primary_tag }}" != "${{ steps.tags.outputs.sha_tag }}" ]]; then
            IMG="${{ steps.tags.outputs.image_repo }}:${{ steps.tags.outputs.sha_tag }}" make docker-push
          fi
